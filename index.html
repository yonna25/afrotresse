      ],
      simulated: true,
    };
  }

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": ANTHROPIC_API_KEY, "anthropic-version": "2023-06-01" },
    body: JSON.stringify({
      model: "claude-opus-4-6",
      max_tokens: 1024,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mimeType, data: base64Image } },
          { type: "text", text: buildPrompt() },
        ],
      }],
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Erreur API ${response.status}`);
  }

  const data = await response.json();
  const raw = data.content?.[0]?.text || "{}";
  const clean = raw.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

function useLS(key, init) {
  const [v, sv] = useState(() => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; } });
  const set = useCallback(val => { sv(val); try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key]);
  return [v, set];
}

function HeroCarousel({ height="100vh", overlay=true }) {
  const [cur, sc] = useState(0);
  const [fade, sf] = useState(true);

  useEffect(() => {
    const t = setInterval(() => {
      sf(false);
      setTimeout(() => { sc(i => (i+1) % HERO_SLIDES.length); sf(true); }, 400);
    }, 3500);
    return () => clearInterval(t);
  }, []);

  const slide = HERO_SLIDES[cur];

  return (
    <div style={{ position:"relative", width:"100%", height, overflow:"hidden" }}>
      {/* Image de fond */}
      <div style={{
        position:"absolute", inset:0,
        backgroundImage:`url(${slide.url})`,
        backgroundSize:"cover", backgroundPosition:"center top",
        transition:"opacity .5s ease",
        opacity: fade ? 1 : 0,
      }} />

      {/* DГғВ©gradГғВ© sombre en bas */}
      {overlay && <div style={{ position:"absolute", inset:0, background:"linear-gradient(to bottom, rgba(44,26,14,.3) 0%, rgba(44,26,14,.15) 40%, rgba(44,26,14,.85) 100%)" }} />}

      {/* Badge style actuel */}
      <div style={{
        position:"absolute", bottom:100, left:20,
        background:"rgba(201,150,58,.25)", backdropFilter:"blur(8px)",
        border:`1px solid rgba(201,150,58,.5)`, borderRadius:50,
        padding:"6px 14px", color:C.cream,
        transition:"opacity .4s", opacity:fade?1:0,
      }}>
        <span style={{ fontSize:11, color:C.gold, fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>{slide.tag}</span>
        <span style={{ fontSize:13, color:C.cream, marginLeft:8 }}>{slide.style}</span>
      </div>

      {/* Points indicateurs */}
      <div style={{ position:"absolute", bottom:72, left:"50%", transform:"translateX(-50%)", display:"flex", gap:6 }}>
        {HERO_SLIDES.map((_,i) => (
          <div key={i} onClick={()=>sc(i)} style={{
            width: i===cur ? 20 : 6, height:6, borderRadius:50,
            background: i===cur ? C.gold : "rgba(255,255,255,.4)",
            transition:"all .3s", cursor:"pointer",
          }} />
        ))}
      </div>
    </div>
  );
}

function Selfie({ go, user, setUser, toast, setAnalysis }) {
  const [phase, sp] = useState("guide"); // guide | preview
  const [photo, setPhoto] = useState(null);
  const [b64, setB64] = useState(null);
  const [mime, setMime] = useState("image/jpeg");

  const onFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    setMime(file.type || "image/jpeg");
    const reader = new FileReader();
    reader.onload = ev => {
      const full = ev.target.result;
      setPhoto(full);
      setB64(full.split(",")[1]);
      sp("preview");
    };
    reader.readAsDataURL(file);
  };

  const launch = async () => {
    if (user?.plan !== "premium" && (user?.points||0) < 10) {
      toast("ГўЕЎВ ГҜВёВҸ 10 points requis. AchГғВЁte un pack ou abonne-toi.");
      go("premium"); return;
    }
    setAnalysis({ b64, mime, photo });
    if (user?.plan !== "premium") setUser({ ...user, points: Math.max(0,(user.points||0)-10), analyses:(user.analyses||0)+1 });
    else setUser({ ...user, analyses:(user.analyses||0)+1 });
    go("analyzing");
  };

  return (
    <div style={{ minHeight:"100vh", background:C.brown }}>
      {/* Viewfinder */}
      <div style={{ width:"100%", height:"62vh", background:"#080403", position:"relative", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
        {photo
          ? <img src={photo} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />

              <span style={{ fontSize:64 }}>Г°ЕёвҖңВ·</span>
              <p style={{ fontSize:13, letterSpacing:1, margin:0 }}>Appuie pour prendre ton selfie</p>
            </div>
        }
        {/* Guide ovale */}
        {phase === "guide" && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <div style={{ width:196, height:260, border:`2px solid rgba(201,150,58,.75)`, borderRadius:"50%", position:"relative" }}>
              {[[{top:-2,left:-2},{borderWidth:"3px 0 0 3px"},{borderRadius:"4px 0 0 0"}],
                [{top:-2,right:-2},{borderWidth:"3px 3px 0 0"},{borderRadius:"0 4px 0 0"}],
                [{bottom:-2,left:-2},{borderWidth:"0 0 3px 3px"},{borderRadius:"0 0 0 4px"}],
                [{bottom:-2,right:-2},{borderWidth:"0 3px 3px 0"},{borderRadius:"0 0 4px 0"}],
              ].map(([pos,bw,br],i) => (
                <div key={i} style={{ position:"absolute", width:22, height:22, borderColor:C.gold, borderStyle:"solid", ...pos, ...bw, ...br }} />
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ContrГғВҙles */}
      <div style={{ padding:"24px 24px 48px", display:"flex", flexDirection:"column", alignItems:"center", gap:16 }}>
        {phase === "preview" ? (
          <>
            <p style={{ color:C.sand, fontSize:14, textAlign:"center", margin:0 }}>Photo prise ГӮВ· Lancer l'analyse IA ?</p>
            <div style={{ display:"flex", gap:10, width:"100%" }}>
              <button onClick={()=>{setPhoto(null);setB64(null);sp("guide");}} style={{ flex:1, padding:"15px", borderRadius:50, background:"rgba(255,255,255,.1)", border:"none", color:C.cream, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>
                ГўвҖ Вә Recommencer
              </button>
              <button onClick={launch} style={{ flex:2, padding:"15px", borderRadius:50, background:`linear-gradient(135deg,${C.gold},#A8782A)`, border:"none", color:C.white, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                ГўЕ“ВҰ Analyser mon visage
              </button>
            </div>
          </>
        ) : (
          <>
            <p style={{ color:C.sand, fontSize:13, textAlign:"center", margin:0 }}>Centre ton visage ГӮВ· Bonne lumiГғВЁre ГӮВ· Regarde l'objectif</p>
            <div style={{ display:"flex", alignItems:"center", gap:28 }}>
              <button onClick={()=>go("home")} style={{ width:52, height:52, borderRadius:"50%", background:"rgba(255,255,255,.1)", border:"none", color:C.cream, fontSize:20, cursor:"pointer" }}>ГўвҖ Вҗ</button>
              <label htmlFor="cam" style={{ width:76, height:76, borderRadius:"50%", background:C.white, border:`4px solid rgba(255,255,255,.3)`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30, boxShadow:`0 0 0 8px rgba(255,255,255,.1)` }}>
                Г°ЕёвҖңВё
              </label>
              <input id="cam" type="file" accept="image/*" capture="user" onChange={onFile} style={{ display:"none" }} />
              <button onClick={()=>toast("Г°ЕёвҖқвҖһ Retournement camГғВ©ra")} style={{ width:52, height:52, borderRadius:"50%", background:"rgba(255,255,255,.1)", border:"none", color:C.cream, fontSize:20, cursor:"pointer" }}>Г°ЕёвҖқвҖһ</button>
            </div>
            <p style={{ color:"rgba(212,184,150,.5)", fontSize:12, margin:0 }}>
              {user?.plan==="premium" ? "ГўЕ“ВҰ Analyses illimitГғВ©es" : `10 points ГӮВ· Il t'en reste ${user?.points||0}`}
            </p>
          </>
        )}
      </div>
    </div>
  );
}

// ANALYSE IA
// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
function Analyzing({ go, analysis, setResults, toast }) {
  const [step, ss] = useState(0);
  const [prog, sp] = useState(0);
  const [err, se] = useState(null);
  const steps = ["DГғВ©tection de la forme du visageГўвӮ¬ВҰ","Analyse des proportionsГўвӮ¬ВҰ","Identification des traitsГўвӮ¬ВҰ","SГғВ©lection des 3 meilleures tressesГўвӮ¬ВҰ"];
  const ran = useRef(false);

  useEffect(() => {
    if (ran.current) return;
    ran.current = true;

    // Anime les ГғВ©tapes en parallГғВЁle de l'appel API
    steps.forEach((_,i) => setTimeout(() => { ss(i+1); sp((i+1)/steps.length*100); }, (i+1)*900));

    // Appel IA rГғВ©el
    analyzeWithClaude(analysis?.b64 || "", analysis?.mime || "image/jpeg")
      .then(data => {
        setTimeout(() => {
          setResults(data);
          go("results");
        }, steps.length * 900 + 600);
      })
      .catch(e => {
        se(e.message);
        toast("ГўВқЕ’ Erreur IA : " + e.message.slice(0,60));
      });
  }, []);

  if (err) return (
    <div style={{ minHeight:"100vh", background:C.brown, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, textAlign:"center" }}>
      <span style={{ fontSize:64, marginBottom:20 }}>ГўЕЎВ ГҜВёВҸ</span>
      <h2 style={{ fontFamily:"'Playfair Display',serif", color:C.cream, fontSize:22, margin:"0 0 12px" }}>Erreur d'analyse</h2>
      <p style={{ color:C.sand, fontSize:14, marginBottom:28, lineHeight:1.5 }}>{err}</p>
      <Btn onClick={()=>go("selfie")}>ГўвҖ Вҗ RГғВ©essayer</Btn>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:C.brown, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 32px", textAlign:"center" }}>
      <div style={{ position:"relative", marginBottom:32 }}>
        <div style={{ width:160, height:160, borderRadius:"50%", background:`linear-gradient(135deg,${C.mid},${C.warm})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:64 }}>Г°ЕёВӘЕҫ</div>
        {[{i:-12,d:"1.2s",bTop:C.gold,bRight:C.gold},{i:-22,d:"2s",rev:true,bBot:"rgba(201,150,58,.4)"}].map((s,k) => (
          <div key={k} style={{ position:"absolute", borderRadius:"50%", border:"2px solid transparent", inset:s.i, borderTopColor:s.bTop||"transparent", borderRightColor:s.bRight||"transparent", borderBottomColor:s.bBot||"transparent", animation:`spin ${s.d} linear infinite ${s.rev?"reverse":""}` }} />
        ))}
      </div>

      <h2 style={{ fontFamily:"'Playfair Display',serif", color:C.cream, fontSize:26, margin:"0 0 8px" }}>Analyse en coursГўвӮ¬ВҰ</h2>
      <p style={{ color:C.sand, fontSize:14, margin:"0 0 28px" }}>
        {ANTHROPIC_API_KEY !== "COLLE_TA_CLE_ICI" ? "AfroTresse IA analyse ton visage" : "Simulation en cours (mode dГғВ©mo)"}
      </p>

      <div style={{ width:"100%", display:"flex", flexDirection:"column", gap:10 }}>
        {steps.map((s,i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:12, background:"rgba(255,255,255,.05)", borderRadius:12, padding:"14px 18px", opacity:step>i?1:.3, transition:"all .5s" }}>
            <div style={{ width:10, height:10, borderRadius:"50%", background:step>i?C.ok:"rgba(201,150,58,.3)", flexShrink:0 }} />
            <span style={{ fontSize:14, color:step>i?C.cream:C.sand, flex:1, textAlign:"left" }}>{s}</span>
            {step>i && <span style={{ color:C.ok, fontSize:14 }}>ГўЕ“вҖң</span>}
          </div>
        ))}
      </div>

      <div style={{ width:"100%", height:4, background:"rgba(255,255,255,.1)", borderRadius:10, marginTop:24, overflow:"hidden" }}>
        <div style={{ height:"100%", background:`linear-gradient(90deg,${C.gold},${C.goldL})`, width:`${prog}%`, transition:"width .6s ease", borderRadius:10 }} />
      </div>
    </div>
  );
}

// RГғвҖ°SULTATS IA ГўвӮ¬вҖқ 3 recommandations
// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
function Results({ go, user, setUser, results, toast }) {
  const recs = results?.recommandations || [];

  // RГғВ©cupГғВЁre les donnГғВ©es complГғВЁtes depuis BRAIDS

function AfroTresse() {
  const [screen, setScreen] = useState("splash");
  const [user, setUser] = useLS("afrotresse_user", null);
  const [analysis, setAnalysis] = useState(null);
  const [results, setResults] = useState(null);
  const [toastState, setToastState] = useState({ msg:"", show:false });
  const tRef = useRef(null);

  const toast = useCallback((msg) => {
    if (tRef.current) clearTimeout(tRef.current);
    setToastState({ msg, show:true });
    tRef.current = setTimeout(() => setToastState(s => ({...s,show:false})), 2600);
  }, []);

  const go = useCallback((s) => { window.scrollTo(0,0); setScreen(s); }, []);

  useEffect(() => { if (user && screen==="splash") setScreen("home"); }, []);

  const p = { go, user, setUser, toast, analysis, setAnalysis, results, setResults };

  const SCREENS = {
    splash:    <Splash    {...p} />,
    register:  <Register  {...p} />,
    login:     <Login     {...p} />,
    home:      <Home      {...p} />,
    selfie:    <Selfie    {...p} />,
    analyzing: <Analyzing {...p} />,
    results:   <Results   {...p} />,
    library:   <Library   {...p} />,
    premium:   <Premium   {...p} />,
    referral:  <Referral  {...p} />,
    profile:   <Profile   {...p} />,
    reviews:   <Reviews   {...p} />,
  };

  return (
    <div style={{ fontFamily:"'DM Sans',sans-serif", background:C.cream, minHeight:"100vh", maxWidth:430, margin:"0 auto", position:"relative", overflowX:"hidden", boxShadow:"0 0 80px rgba(0,0,0,.18)" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{margin:0;padding:0}
        button:active{transform:scale(0.96)}
        @keyframes spin{to{transform:rotate(360deg)}}
        input,select,textarea{-webkit-appearance:none}
        ::-webkit-scrollbar{display:none}
        *{scrollbar-width:none}
      `}</style>
      {SCREENS[screen] || SCREENS.splash}
      <Toast msg={toastState.msg} show={toastState.show} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AfroTresse));
