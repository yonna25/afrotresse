// ─── Gestion économique de l'API ──────────────────────────────────────────
const FREE_LIMIT        = 3;   // analyses gratuites de base
const BONUS_LIMIT       = 5;   // analyses bonus après avis WhatsApp
const TOTAL_FREE_LIMIT  = 8;   // total max gratuit (3+5)
const CACHE_KEY         = "afrotresse_cache";
const USAGE_KEY         = "afrotresse_total_usage";
const BONUS_KEY         = "afrotresse_bonus_unlocked";

// ─── Compteur total d'analyses (pas quotidien) ────────────────────────────
function getTotalUsage() {
  try { return parseInt(localStorage.getItem(USAGE_KEY) || "0"); }
  catch { return 0; }
}

function isBonusUnlocked() {
  try { return localStorage.getItem(BONUS_KEY) === "true"; }
  catch { return false; }
}

function unlockBonus() {
  try { localStorage.setItem(BONUS_KEY, "true"); }
  catch {}
}

function getCurrentLimit() {
  return isBonusUnlocked() ? TOTAL_FREE_LIMIT : FREE_LIMIT;
}

function getRemainingAnalyses() {
  return Math.max(0, getCurrentLimit() - getTotalUsage());
}

function incrementTotalUsage() {
  try {
    const current = getTotalUsage();
    localStorage.setItem(USAGE_KEY, String(current + 1));
  } catch {}
}

// Fingerprint léger pour éviter contournement par effacement cache
function getDeviceFingerprint() {
  try {
    const fp = [
      navigator.language,
      navigator.platform,
      screen.width + "x" + screen.height,
      new Date().getTimezoneOffset(),
    ].join("|");
    return btoa(fp).slice(0, 12);
  } catch { return "unknown"; }
}

function getCachedResult(imageHash) {
  try {
    const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");
    const entry = cache[imageHash];
    if (!entry) return null;
    // Cache valide 24h
    if (Date.now() - entry.ts > 86400000) return null;
    return entry.result;
  } catch { return null; }
}

function setCachedResult(imageHash, result) {
  try {
    const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");
    // Garde max 10 entrées en cache
    const keys = Object.keys(cache);
    if (keys.length >= 10) delete cache[keys[0]];
    cache[imageHash] = { result, ts: Date.now() };
    localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
  } catch {}
}

function simpleHash(str) {
  // Hash rapide pour identifier une image sans stocker les pixels
  let h = 0;
  for (let i = 0; i < Math.min(str.length, 500); i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return h.toString(36);
}

// ─── Appel à l'API Claude Vision — économique ─────────────────────────────
async function analyzeWithClaude(base64Image, mimeType = "image/jpeg") {

  // 2. Vérifier le cache — même image = pas d'appel API
  const imageHash = simpleHash(base64Image);
  const cached = getCachedResult(imageHash);
  if (cached) {
    console.log("✓ Résultat depuis le cache — 0 crédit utilisé");
    localStorage.setItem("afrotresse_pending_result", JSON.stringify(cached));
    return { ...cached, fromCache: true };
  }

  // 3. Vérifier le quota total
  const usage = getTotalUsage();
  const limit = getCurrentLimit();
  if (usage >= limit) {
    throw new Error(`LIMIT_REACHED:${usage}:${isBonusUnlocked()}`);
  }

  // 4. Redimensionner l'image via canvas avant envoi (max 800px, qualité 0.7)
  let optimizedImage = base64Image;
  let optimizedMime = mimeType;
  try {
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = "data:" + mimeType + ";base64," + base64Image;
    });
    const MAX = 800;
    const scale = Math.min(1, MAX / Math.max(img.width, img.height));
    const canvas = document.createElement("canvas");
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
    optimizedImage = dataUrl.split(",")[1];
    optimizedMime = "image/jpeg";
  } catch(e) {
    console.warn("Redimensionnement échoué, image originale utilisée", e);
  }

  // 5. Appel via le proxy Vercel (la clé API est côté serveur, jamais exposée)
  const response = await fetch("/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001", // modèle léger = moins cher
      max_tokens: 600, // réduit de 1024 → 600 (économie 40%)
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: optimizedMime, data: optimizedImage } },
          { type: "text", text: buildPrompt() },
        ],
      }],
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Erreur API ${response.status}`);
  }

  const data = await response.json();
  const raw = data.content?.[0]?.text || "{}";
  const clean = raw.replace(/```json|```/g, "").trim();
  const result = JSON.parse(clean);

  // 6. Sauvegarder en cache + incrémenter compteur total
  setCachedResult(imageHash, result);
  incrementTotalUsage();
  console.log(`✓ Analyse ${getTotalUsage()}/${getCurrentLimit()} au total`);

  // Stocker résultat en attente pour Results
  localStorage.setItem("afrotresse_pending_result", JSON.stringify(result));
  return result;
}

function HeroCarousel({ height="100vh", overlay=true }) {
  const [cur, sc] = useState(0);
  const [fade, sf] = useState(true);

  useEffect(() => {
    const t = setInterval(() => {
      sf(false);
      setTimeout(() => { sc(i => (i+1) % HERO_SLIDES.length); sf(true); }, 400);
    }, 3500);
    return () => clearInterval(t);
  }, []);

  const slide = HERO_SLIDES[cur];

  return (
    <div style={{ position:"relative", width:"100%", height, overflow:"hidden" }}>
      {/* Image de fond */}
      <div style={{
        position:"absolute", inset:0,
        backgroundImage:`url(${slide.url})`,
        backgroundSize:"cover", backgroundPosition:"center top",
        transition:"opacity .5s ease",
        opacity: fade ? 1 : 0,
      }} />

      {/* Dégradé sombre en bas */}
      {overlay && <div style={{ position:"absolute", inset:0, background:"linear-gradient(to bottom, rgba(44,26,14,.3) 0%, rgba(44,26,14,.15) 40%, rgba(44,26,14,.85) 100%)" }} />}

      {/* Points indicateurs */}
      <div style={{ position:"absolute", bottom:16, left:"50%", transform:"translateX(-50%)", display:"flex", gap:6, zIndex:4 }}>
        {HERO_SLIDES.map((_,i) => (
          <div key={i} onClick={()=>sc(i)} style={{
            width: i===cur ? 20 : 6, height:6, borderRadius:50,
            background: i===cur ? C.gold : "rgba(255,255,255,.4)",
            transition:"all .3s", cursor:"pointer",
          }} />
        ))}
      </div>
      {/* Tag slide — exposé via ref pour le Home */}
      <div data-slide-tag style={{ display:"none" }}>{slide.tag}||{slide.style}</div>
    </div>
  );
}

// SELFIE  
// ═══════════════════════════════════════════════════════════
function Selfie({ go, user, setUser, toast, setAnalysis }) {
  const [phase, sp] = useState("guide"); // guide | preview
  const [photo, setPhoto] = useState(null);
  const [b64, setB64] = useState(null);
  const [mime, setMime] = useState("image/jpeg");

  const onFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    setMime(file.type || "image/jpeg");
    const reader = new FileReader();
    reader.onload = ev => {
      const full = ev.target.result;
      setPhoto(full);
      setB64(full.split(",")[1]);
      sp("preview");
    };
    reader.readAsDataURL(file);
  };

  const launch = async () => {
    if (user?.plan === "premium") {
      setAnalysis({ b64, mime, photo });
      setUser({ ...user, analyses:(user.analyses||0)+1 });
      go("analyzing");
      return;
    }
    const usage = getTotalUsage();
    const limit = getCurrentLimit();
    if (usage >= limit) { go("quota"); return; }
    setAnalysis({ b64, mime, photo });
    setUser({ ...user, analyses:(user.analyses||0)+1 });
    go("analyzing");
  };

  return (
    <div style={{ minHeight:"100vh", background:C.brown }}>
      {/* Viewfinder */}
      <div style={{ width:"100%", height:"62vh", background:"#080403", position:"relative", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
        {photo
          ? <img src={photo} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
          : <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:12, color:"rgba(250,244,236,.25)" }}>
              <span style={{ fontSize:64 }}>📷</span>
              <p style={{ fontSize:13, letterSpacing:1, margin:0 }}>Appuie pour prendre ton selfie</p>
            </div>
        }
        {/* Guide ovale */}
        {phase === "guide" && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <div style={{ width:196, height:260, border:`2px solid rgba(201,150,58,.75)`, borderRadius:"50%", position:"relative" }}>
              {[[{top:-2,left:-2},{borderWidth:"3px 0 0 3px"},{borderRadius:"4px 0 0 0"}],
                [{top:-2,right:-2},{borderWidth:"3px 3px 0 0"},{borderRadius:"0 4px 0 0"}],
                [{bottom:-2,left:-2},{borderWidth:"0 0 3px 3px"},{borderRadius:"0 0 0 4px"}],
                [{bottom:-2,right:-2},{borderWidth:"0 3px 3px 0"},{borderRadius:"0 0 4px 0"}],
              ].map(([pos,bw,br],i) => (
                <div key={i} style={{ position:"absolute", width:22, height:22, borderColor:C.gold, borderStyle:"solid", ...pos, ...bw, ...br }} />
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Contrôles */}
      <div style={{ padding:"24px 24px 48px", display:"flex", flexDirection:"column", alignItems:"center", gap:16 }}>
        {phase === "preview" ? (
          <>
            <p style={{ color:C.sand, fontSize:14, textAlign:"center", margin:0 }}>Photo prise · Lancer l'analyse IA ?</p>
            <div style={{ display:"flex", gap:10, width:"100%" }}>
              <button onClick={()=>{setPhoto(null);setB64(null);sp("guide");}} style={{ flex:1, padding:"15px", borderRadius:50, background:"rgba(255,255,255,.1)", border:"none", color:C.cream, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>
                ↺ Recommencer
              </button>
              <button onClick={launch} style={{ flex:2, padding:"15px", borderRadius:50, background:`linear-gradient(135deg,${C.gold},#A8782A)`, border:"none", color:C.white, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                ✦ Analyser mon visage

        ) : (
          <>
            <p style={{ color:C.sand, fontSize:13, textAlign:"center", margin:0 }}>Centre ton visage · Bonne lumière · Regarde l'objectif</p>
            <div style={{ display:"flex", alignItems:"center", gap:28 }}>

// ═══════════════════════════════════════════════════════════
// ANALYSE IA
// ═══════════════════════════════════════════════════════════
function Analyzing({ go, setScreen, analysis, setResults, toast }) {
  const [step, ss] = useState(0);
  const [prog, sp] = useState(0);
  const [err, se] = useState(null);
  const steps = ["Détection de la forme du visage…","Analyse des proportions…","Identification des traits…","Sélection des 3 meilleures tresses…"];
  const ran = useRef(false);

  useEffect(() => {
    if (ran.current) return;
    ran.current = true;

    const startTime = Date.now();
    // Anime les étapes en parallèle de l'appel API
    steps.forEach((_,i) => setTimeout(() => { ss(i+1); sp((i+1)/steps.length*100); }, (i+1)*900));

    // Appel IA réel
    analyzeWithClaude(analysis?.b64 || "", analysis?.mime || "image/jpeg")
      .then(data => {
        const animDuration = steps.length * 900 + 600;
        const elapsed = Date.now() - startTime;
        const remaining = Math.max(0, animDuration - elapsed);
        const showResults = () => {
          localStorage.setItem("afrotresse_pending_result", JSON.stringify(data));
          go("results");
        };
        if (remaining > 0) {
          setTimeout(showResults, remaining);
        } else {
          showResults();
        }
      })
      .catch(e => {
        se(e.message);
        toast("❌ Erreur IA : " + e.message.slice(0,60));
      });
  }, []);

  if (err) return (
    <div style={{ minHeight:"100vh", background:C.brown, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, textAlign:"center" }}>
      <span style={{ fontSize:64, marginBottom:20 }}>⚠️</span>
      <h2 style={{ fontFamily:"'Playfair Display',serif", color:C.cream, fontSize:22, margin:"0 0 12px" }}>Erreur d'analyse</h2>
      <p style={{ color:C.sand, fontSize:14, marginBottom:28, lineHeight:1.5 }}>{err}</p>
      <Btn onClick={()=>go("selfie")}>← Réessayer</Btn>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:C.brown, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 32px", textAlign:"center" }}>
      <div style={{ position:"relative", marginBottom:32 }}>
        <div style={{ width:160, height:160, borderRadius:"50%", background:`linear-gradient(135deg,${C.mid},${C.warm})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:64 }}>🪞</div>
        {[{i:-12,d:"1.2s",bTop:C.gold,bRight:C.gold},{i:-22,d:"2s",rev:true,bBot:"rgba(201,150,58,.4)"}].map((s,k) => (
          <div key={k} style={{ position:"absolute", borderRadius:"50%", border:"2px solid transparent", inset:s.i, borderTopColor:s.bTop||"transparent", borderRightColor:s.bRight||"transparent", borderBottomColor:s.bBot||"transparent", animation:`spin ${s.d} linear infinite ${s.rev?"reverse":""}` }} />
        ))}
      </div>

      <h2 style={{ fontFamily:"'Playfair Display',serif", color:C.cream, fontSize:26, margin:"0 0 8px" }}>Analyse en cours…</h2>
      <p style={{ color:C.sand, fontSize:14, margin:"0 0 28px" }}>
        {"AfroTresse IA analyse ton visage"}
      </p>

      <div style={{ width:"100%", display:"flex", flexDirection:"column", gap:10 }}>
        {steps.map((s,i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:12, background:"rgba(255,255,255,.05)", borderRadius:12, padding:"14px 18px", opacity:step>i?1:.3, transition:"all .5s" }}>
            <div style={{ width:10, height:10, borderRadius:"50%", background:step>i?C.ok:"rgba(201,150,58,.3)", flexShrink:0 }} />
            <span style={{ fontSize:14, color:step>i?C.cream:C.sand, flex:1, textAlign:"left" }}>{s}</span>
            {step>i && <span style={{ color:C.ok, fontSize:14 }}>✓</span>}
          </div>
        ))}
      </div>

      <div style={{ width:"100%", height:4, background:"rgba(255,255,255,.1)", borderRadius:10, marginTop:24, overflow:"hidden" }}>
        <div style={{ height:"100%", background:`linear-gradient(90deg,${C.gold},${C.goldL})`, width:`${prog}%`, transition:"width .6s ease", borderRadius:10 }} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// RÉSULTATS IA — 3 recommandations
// ═══════════════════════════════════════════════════════════
function Results({ go, user, setUser, results, setResults, toast }) {
  // Lire depuis localStorage si results pas encore dans le state
  const data = results || (() => {
    try { return JSON.parse(localStorage.getItem("afrotresse_pending_result") || "null"); } catch { return null; }
  })();
  const recs = data?.recommandations || [];

  // Récupère les données complètes depuis BRAIDS
  const enriched = recs.map(r => {
    const found = BRAIDS.find(b => b.name.toLowerCase() === r.nom.toLowerCase()) ||
                  BRAIDS.find(b => r.nom.toLowerCase().includes(b.name.toLowerCase().split(" ")[0])) ||
                  BRAIDS[Math.floor(Math.random()*3)];
    return { ...found, score:r.score, aiRaison:r.raison, nom:r.nom };
  });

  const save = (style) => {
    if (user?.plan !== "premium" && (user?.points||0) < 5) {
      toast("⚠️ 5 points requis pour sauvegarder"); go("premium"); return;
    }
    const saved = user?.saved || [];
    if (saved.includes(style.id)) { toast("✅ Déjà dans ta bibliothèque !"); return; }
    const pts = user?.plan === "premium" ? user.points : Math.max(0,(user.points||0)-5);
    setUser({...user, saved:[...saved,style.id], points:pts});
    toast(`💾 "${style.nom || style.name}" sauvegardé !`);
  };

  const bgs = [`linear-gradient(135deg,${C.mid},${C.brown})`,`linear-gradient(135deg,#3D1A0A,#6B2E10)`,`linear-gradient(135deg,#1A2C1A,#2D5A2D)`];

  return (
    <div style={{ minHeight:"100vh", background:C.cream, paddingBottom:110 }}>
      {/* Header */}

function AfroTresse() {
  const [screen, setScreen] = useState("splash");
  const [user, setUser] = useLS("afrotresse_user", null);
  const [analysis, setAnalysis] = useState(null);
  const [results, setResults] = useState(null);
  const [toastState, setToastState] = useState({ msg:"", show:false });
  const tRef = useRef(null);

  const toast = useCallback((msg) => {
    if (tRef.current) clearTimeout(tRef.current);
    setToastState({ msg, show:true });
    tRef.current = setTimeout(() => setToastState(s => ({...s,show:false})), 2600);
  }, []);

  const goRef = useRef(null);
  const go = useCallback((s) => {
    // Vérifier quota avant d'aller sur selfie
    if (s === "selfie" && getTotalUsage() >= getCurrentLimit()) {
      window.scrollTo(0,0); setScreen("quota"); return;
    }
    window.scrollTo(0,0); setScreen(s);
  }, []);
  goRef.current = go;

  useEffect(() => { if (user && screen==="splash") setScreen("home"); }, []);



  const p = { go, setScreen, user, setUser, toast, analysis, setAnalysis, results, setResults };

  return (
    <div style={{ fontFamily:"'DM Sans',sans-serif", background:C.cream, minHeight:"100vh", maxWidth:430, margin:"0 auto", position:"relative", overflowX:"hidden", boxShadow:"0 0 80px rgba(0,0,0,.18)" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{margin:0;padding:0}
        button:active{transform:scale(0.96)}
        @keyframes spin{to{transform:rotate(360deg)}}
        input,select,textarea{-webkit-appearance:none}
        ::-webkit-scrollbar{display:none}
        *{scrollbar-width:none}
      `}</style>
      { screen === "splash"    ? <Splash    {...p} /> :
        screen === "register"  ? <Register  {...p} /> :
        screen === "login"     ? <Login     {...p} /> :
        screen === "home"      ? <Home      {...p} /> :
        screen === "selfie"    ? <Selfie    {...p} /> :
        screen === "analyzing" ? <Analyzing {...p} /> :
        screen === "results"   ? <Results   {...p} /> :
        screen === "library"   ? <Library   {...p} /> :
        screen === "premium"   ? <Premium   {...p} /> :
        screen === "referral"  ? <Referral  {...p} /> :
        screen === "profile"   ? <Profile   {...p} /> :
        screen === "reviews"   ? <Reviews   {...p} /> :
        screen === "quota"     ? <QuotaScreen {...p} bonusAlreadyUsed={isBonusUnlocked()} /> :
        <Splash {...p} />
      }
      <Toast msg={toastState.msg} show={toastState.show} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AfroTresse));
